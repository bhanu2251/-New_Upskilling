version: 2

models:

  - name: dim_account
    description: >
      SCD1 Gold dimension — one row per active NetSuite account.
      FINANCIAL_STATEMENT, PL_CATEGORY, BS_CATEGORY derived from ACCOUNT_TYPE in Silver.
      IS_DA flag identifies depreciation and amortisation accounts for EBITDA calculation.
    columns:
      - name: ACCOUNT_KEY
        description: "Surrogate key — MD5 hash of ACCOUNT_ID."
        data_tests: [unique, not_null]
      - name: ACCOUNT_ID
        description: "Natural key — NetSuite account ID."
        data_tests: [unique, not_null]
      - name: ACCOUNT_TYPE
        description: "NetSuite account type — determines financial statement classification."
        data_tests: [not_null]
      - name: FINANCIAL_STATEMENT
        description: "Derived: P&L, Balance Sheet, or Unclassified."
        data_tests:
          - not_null
          - accepted_values:
              values: ['P&L', 'Balance Sheet', 'Unclassified']
      - name: CASH_FLOW_RATE
        description: "Cash Flow Statement category — Operating, Investing, or Financing. NULL for non-cash-flow accounts."
        data_tests:
          - accepted_values:
              values: ['Operating', 'Investing', 'Financing']
              config:
                where: "CASH_FLOW_RATE IS NOT NULL"
      - name: IS_DA
        description: "TRUE if this is a depreciation or amortisation account."
        data_tests: [not_null]
      - name: DW_CREATED_AT
        data_tests: [not_null]
      - name: DW_UPDATED_AT
        data_tests: [not_null]
      - name: DW_SOURCE_SYSTEM
        data_tests: [not_null]

  - name: dim_subsidiary
    description: >
      SCD1 Gold dimension — one row per legal entity / portfolio company.
      IS_ELIMINATION flags the subsidiary used to net out intercompany entries.
      IS_PARENT_ENTITY=TRUE identifies PCP Holdings (no parent).
    columns:
      - name: SUBSIDIARY_KEY
        description: "Surrogate key — MD5 hash of SUBSIDIARY_ID."
        data_tests: [unique, not_null]
      - name: SUBSIDIARY_ID
        description: "Natural key — NetSuite subsidiary ID."
        data_tests: [unique, not_null]
      - name: SUBSIDIARY_NAME
        data_tests: [not_null]
      - name: IS_ELIMINATION
        description: "TRUE for the elimination subsidiary used in intercompany netting."
      - name: DW_CREATED_AT
        data_tests: [not_null]
      - name: DW_UPDATED_AT
        data_tests: [not_null]

