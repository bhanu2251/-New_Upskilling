version: 2

models:

  - name: fact_gl_journal
    description: >
      Core GL fact — one row per posted accounting line (TRANSACTION_ID + LINE_ID + ACCOUNTING_BOOK_ID).
      Single source of truth for all three financial statements.
      REPORTING_AMOUNT_USD pre-translated in Silver using AVERAGERATE (P&L),
      CURRENTRATE (BS assets/liabilities), HISTORICALRATE (equity).
    columns:
      - name: GL_JOURNAL_KEY
        description: "Surrogate key — MD5 of TRANSACTION_ID + LINE_ID + ACCOUNTING_BOOK_ID."
        data_tests: [unique, not_null]
      - name: TRANSACTION_ID
        data_tests: [not_null]
      - name: LINE_ID
        data_tests: [not_null]
      - name: ACCOUNT_KEY
        description: "FK → DIM_ACCOUNT."
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_account')
              field: ACCOUNT_KEY
              config:
                severity: warn
      - name: SUBSIDIARY_KEY
        description: "FK → DIM_SUBSIDIARY."
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_subsidiary')
              field: SUBSIDIARY_KEY
              config:
                severity: warn
      - name: PERIOD_KEY
        description: "FK → DIM_PERIOD."
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_period')
              field: PERIOD_KEY
              config:
                severity: warn
      - name: DEPARTMENT_KEY
        description: "FK → DIM_DEPARTMENT."
        data_tests:
          - relationships:
              to: ref('dim_department')
              field: DEPARTMENT_KEY
              config:
                severity: warn
      - name: CLASSIFICATION_KEY
        description: "FK → DIM_CLASSIFICATION."
        data_tests:
          - relationships:
              to: ref('dim_classification')
              field: CLASSIFICATION_KEY
              config:
                severity: warn
      - name: CURRENCY_KEY
        description: "FK → DIM_CURRENCY."
        data_tests:
          - relationships:
              to: ref('dim_currency')
              field: CURRENCY_KEY
              config:
                severity: warn
      - name: IS_POSTING
        data_tests:
          - not_null
          - accepted_values:
              values: [true]
      - name: DW_CREATED_AT
        data_tests: [not_null]
      - name: DW_UPDATED_AT
        data_tests: [not_null]

  - name: fact_income_statement
    description: >
      P&L periodic snapshot — one row per subsidiary + period + department + classification + account.
      Filters FACT_GL_JOURNAL to FINANCIAL_STATEMENT = 'P&L' accounts.
      Calculates GROSS_PROFIT, GROSS_MARGIN_PCT, EBITDA, EBIT, NET_INCOME, and period-over-period variance.
      All amounts in USD.
    columns:
      - name: INCOME_STATEMENT_KEY
        data_tests: [unique, not_null]
      - name: SUBSIDIARY_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_subsidiary')
              field: SUBSIDIARY_KEY
              config:
                severity: warn
      - name: PERIOD_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_period')
              field: PERIOD_KEY
              config:
                severity: warn
      - name: ACCOUNT_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_account')
              field: ACCOUNT_KEY
              config:
                severity: warn
      - name: DW_CREATED_AT
        data_tests: [not_null]
      - name: DW_UPDATED_AT
        data_tests: [not_null]

  - name: fact_balance_sheet
    description: >
      Balance Sheet periodic snapshot — one row per subsidiary + period-end + account.
      Cumulative closing balance = SUM of all movements from the earliest period to period-end.
      Filters FACT_GL_JOURNAL to FINANCIAL_STATEMENT = 'Balance Sheet'.
      All amounts in USD.
    columns:
      - name: BALANCE_SHEET_KEY
        data_tests: [unique, not_null]
      - name: SUBSIDIARY_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_subsidiary')
              field: SUBSIDIARY_KEY
              config:
                severity: warn
      - name: PERIOD_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_period')
              field: PERIOD_KEY
              config:
                severity: warn
      - name: ACCOUNT_KEY
        data_tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_account')
              field: ACCOUNT_KEY
              config:
                severity: warn
      - name: BS_CATEGORY
        data_tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values: ['Current Asset', 'Non-Current Asset', 'Current Liability',
                       'Non-Current Liability', 'Equity']
              config:
                severity: warn
      - name: DW_CREATED_AT
        data_tests: [not_null]
      - name: DW_UPDATED_AT
        data_tests: [not_null]

  - name: fact_cash_flow
    description: >
      Cash Flow Statement periodic snapshot — one row per subsidiary + period + cash flow category + account.
      Groups GL movements by CASH_FLOW_RATE (HISTORICAL, AVERAGE).
      Only accounts with CASH_FLOW_RATE IS NOT NULL included.
    columns:
      - name: CASH_FLOW_KEY
        data_tests: [unique, not_null]
      - name: SUBSIDIARY_KEY
        data_tests:
