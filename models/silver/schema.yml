version: 2

models:

  - name: silver_account
    description: "Cleaned Chart of Accounts. ACCTTYPE determines which financial statement each account appears on. CASHFLOWRATE drives Cash Flow Statement. GENERALRATE controls FX translation."
    columns:
      - name: account_id
        description: "Primary key - unique account identifier"
        tests:
          - unique
          - not_null
      - name: account_type
        description: "NetSuite account type - determines P&L vs Balance Sheet classification"
        tests:
          - not_null
      - name: financial_statement
        description: "Derived classification - P&L or Balance Sheet"
        tests:
          - not_null
          - accepted_values:
              values: ['P&L', 'Balance Sheet', 'Unclassified']

  - name: silver_accountingperiod
    description: "Cleaned fiscal calendar. ISPOSTING=true periods accept journal entries. CLOSED periods are locked. ISADJUST flags year-end adjustment periods."
    columns:
      - name: period_id
        description: "Primary key - unique period identifier"
        tests:
          - unique
          - not_null
      - name: start_date
        description: "Period start date"
        tests:
          - not_null
      - name: end_date
        description: "Period end date"
        tests:
          - not_null

  - name: silver_currency
    description: "Currency master. ISBASECURRENCY identifies USD as group reporting currency."
    columns:
      - name: currency_id
        description: "Primary key - unique currency identifier"
        tests:
          - unique
          - not_null
      - name: currency_symbol
        description: "Currency symbol e.g. USD, CAD, GBP"
        tests:
          - not_null

  - name: silver_subsidiary
    description: "Legal entity hierarchy. PARENT defines consolidation tree. ISELIMINATION flags intercompany elimination subsidiary."
    columns:
      - name: subsidiary_id
        description: "Primary key - unique subsidiary identifier"
        tests:
          - unique
          - not_null
      - name: subsidiary_name
        description: "Subsidiary display name"
        tests:
          - not_null

  - name: silver_department
    description: "Department hierarchy for departmental P&L. Maps each GL line to a cost centre."
    columns:
      - name: department_id
        description: "Primary key - unique department identifier"
        tests:
          - unique
          - not_null

  - name: silver_classification
    description: "Business line / class segmentation for P&L by revenue stream."
    columns:
      - name: class_id
        description: "Primary key - unique classification identifier"
        tests:
          - unique
          - not_null

  - name: silver_location
    description: "Physical and operational location master."
    columns:
      - name: location_id
        description: "Primary key - unique location identifier"
        tests:
          - unique
          - not_null

  - name: silver_entity
    description: "Unified counterparty master - customers, vendors, employees and partners."
    columns:
      - name: entity_id
        description: "Primary key - unique entity identifier"
        tests:
          - unique
          - not_null

  - name: silver_transactionstatus
    description: "Lookup table for transaction status codes. Used to decode STATUS field on TRANSACTION."
    columns:
      - name: transaction_status_id
        description: "Primary key - unique status identifier"
        tests:
          - unique
          - not_null

  - name: silver_item
    description: "Product and service item master. Used for COGS analysis by product line."
    columns:
      - name: item_id
        description: "Primary key - unique item identifier"
        tests:
          - unique
          - not_null

  - name: silver_employee
    description: "Employee master. Used to attribute employee-related GL entries to correct department."
    columns:
      - name: employee_id
        description: "Primary key - unique employee identifier"
        tests:
          - unique
          - not_null

  - name: silver_consolidatedexchangerate
    description: "Period-level FX rates for USD consolidation. AVERAGERATE for P&L, CURRENTRATE for Balance Sheet assets/liabilities, HISTORICALRATE for equity."
    columns:
      - name: exchange_rate_id
        description: "Primary key - unique exchange rate record identifier"
        tests:
          - unique
          - not_null
      - name: average_rate
        description: "Average rate for P&L translation - must not be null for non-USD subsidiaries"
        tests:
          - not_null
      - name: current_rate
        description: "Period-end spot rate for Balance Sheet translation"
        tests:
          - not_null
      - name: historical_rate
        description: "Historical rate for equity translation"
        tests:
          - not_null

  - name: silver_transaction
    description: "Cleaned transaction headers. Filtered to VOID=FALSE and POSTING=TRUE only. Foundation for all downstream GL work."
    columns:
      - name: transaction_id
        description: "Primary key - unique transaction identifier"
        tests:
          - unique
          - not_null
      - name: transaction_ref
        description: "NetSuite TRANID - the document number traceable back to source"
        tests:
          - not_null
      - name: posting_period_id
        description: "FK to silver_accountingperiod"
        tests:
          - not_null
          - relationships:
              to: ref('silver_accountingperiod')
              field: period_id
      - name: subsidiary_id
        description: "FK to silver_subsidiary"
        tests:
          - not_null
          - relationships:
              to: ref('silver_subsidiary')
              field: subsidiary_id
      - name: is_void
        description: "Must always be FALSE in this model - voided transactions are excluded"
        tests:
          - accepted_values:
              values: [false]
      - name: is_posting
        description: "Must always be TRUE in this model - non-posting transactions are excluded"
        tests:
          - accepted_values:
              values: [true]

  - name: silver_transactionline
    description: "Cleaned transaction lines. MAINLINE=FALSE filter applied to avoid double-counting. Only lines from posted non-voided transactions included."
    columns:
      - name: transaction_id
        description: "FK to silver_transaction"
        tests:
          - not_null
          - relationships:
              to: ref('silver_transaction')
              field: transaction_id
      - name: line_id
        description: "Line sequence number within transaction"
        tests:
          - not_null

  - name: silver_transactionaccountingline
    description: >
      The clean General Ledger - single source of truth for all financial statements.
      POSTING=TRUE filter applied. Voided transactions excluded via join to silver_transaction.
      FX translation applied: AVERAGERATE for P&L, CURRENTRATE for BS assets/liabilities,
      HISTORICALRATE for equity.
    columns:
      - name: transaction_id
        description: "FK to silver_transaction"
        tests:
          - not_null
          - relationships:
              to: ref('silver_transaction')
              field: transaction_id
      - name: account_id
        description: "FK to silver_account"
        tests:
          - not_null
          - relationships:
              to: ref('silver_account')
              field: account_id
      - name: period_id
        description: "FK to silver_accountingperiod"
        tests:
          - not_null
          - relationships:
              to: ref('silver_accountingperiod')
              field: period_id
      - name: subsidiary_id
        description: "FK to silver_subsidiary"
        tests:
          - not_null
          - relationships:
              to: ref('silver_subsidiary')
              field: subsidiary_id
      - name: is_posting
        description: "Must always be TRUE - non-posting lines are excluded"
        tests:
          - accepted_values:
              values: [true]
      - name: reporting_amount_usd
        description: "Amount translated to USD using correct rate type per account classification"
        tests:
          - not_null
